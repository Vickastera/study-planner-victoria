<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINO LEVEL 2 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ONBOARDING -->
<div id="onboarding" class="screen">
  <h1 class="title">MINO PRO</h1>
  <input id="nameInput" placeholder="Your name">
  <input id="subjectInput" placeholder="Add subject">
  <button onclick="addSubject()">ADD SUBJECT</button>
  <div id="subjectList"></div>
  <button onclick="startApp()">START GAME</button>
</div>
<!-- APP -->
<div id="app" class="screen hidden">
  <div class="header">
    <h2 id="userTitle"></h2>
    <div>
      <span id="level">Lv 1</span> |
      <span id="xp">XP 0</span> |
      <span id="streak">🔥 0</span>
    </div>
    <div class="xp-bar-container">
      <div class="xp-bar" id="xpBar" style="width: 0%"></div>
    </div>
  </div>
  <div class="card">
    <input id="taskInput" placeholder="New task...">
    <select id="subjectSelect"></select>
    <button onclick="addTask()">ADD TASK</button>
  </div>
  <div id="taskList"></div>
  <div id="undoBar" class="hidden">
    <button onclick="undoDelete()">UNDO DELETE</button>
  </div>
  <button onclick="resetApp()">RESET</button>
</div>
<script src="script.js"></script>
</body>
</html>
